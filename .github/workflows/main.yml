name: Build VideoEdit Pro APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Create Clean Android Structure
        run: |
          mkdir -p app/src/main/java/com/videoeditpro/app
          mkdir -p app/src/main/res/values
          
          # 1. ملف الإعدادات الأساسي المبسط
          cat << 'EOF' > settings.gradle
          include ':app'
          EOF

          # 2. ملف البناء الرئيسي للمشروع
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # 3. ملف بناء التطبيق بصياغة كلاسيكية آمنة ومستقرة 100%
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.videoeditpro.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.videoeditpro.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures {
                  compose true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion '1.4.6'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
              implementation 'androidx.activity:activity-compose:1.8.2'
              
              // حزمة مكتبات الكومبوز المستقرة بدون مصفوفات معقدة
              implementation 'androidx.compose.ui:ui:1.4.3'
              implementation 'androidx.compose.ui:ui-graphics:1.4.3'
              implementation 'androidx.compose.ui:ui-tooling-preview:1.4.3'
              implementation 'androidx.compose.material3:material3:1.1.1'
              
              // مكتبة إعلانات AdMob الرسمية لحسابك
              implementation 'com.google.android.gms:play-services-ads:23.0.0'
          }
          EOF

          # 4. ملف الثيمات
          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources></resources>
          EOF

          # 5. نقل ملف الكود الحقيقي إلى مساره البرمجي الصحيح
          if [ -f "MainActivity.kt" ]; then
            cp MainActivity.kt app/src/main/java/com/videoeditpro/app/MainActivity.kt
          elif [ -f "MainActivity.kt.kt" ]; then
            cp MainActivity.kt.kt app/src/main/java/com/videoeditpro/app/MainActivity.kt
          fi

          # 6. ملف المانيفست المدمج به كود الربح الحقيقي لحسابك الشخصي
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.videoeditpro.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application 
                  android:allowBackup="true"
                  android:label="VideoEdit Pro"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.Material.NoActionBar">
                  
                  <meta-data 
                      android:name="com.google.android.gms.ads.APPLICATION_ID" 
                      android:value="ca-app-pub-8995513369904529~8169198851"/>
                      
                  <activity 
                      android:name=".MainActivity" 
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          gradle wrapper --gradle-version 8.0.2

      - name: Build Official Production APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoEditPro-Official-APK
          path: app/build/outputs/apk/debug/app-debug.apk
